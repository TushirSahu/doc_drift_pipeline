name: Continuous RAG Evaluation

on:
  push:
    paths:
      - 'data/**/*.md'
      - 'src/**'
      - 'config/**'
      - 'pipeline.py'
  pull_request:
    paths:
      - 'data/**/*.md'
      - 'src/**'
      - 'config/**'
      - 'pipeline.py'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: pytest tests/ -v

  evaluate-rag:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: curl -fsSL https://ollama.com/install.sh | sh

      - run: ollama serve & sleep 10

      - run: |
          ollama pull llama3.2:3b
          ollama pull nomic-embed-text

      - name: Run evaluation (fails on drift)
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: |
          set +e
          python pipeline.py | tee eval_output.txt
          code=${PIPESTATUS[0]}
          {
            echo '## 📊 RAG Evaluation'
            echo '```'
            grep -A20 'EVALUATION RESULTS' eval_output.txt || tail -n 25 eval_output.txt
            echo '```'
            if [ "$code" -eq 0 ]; then echo '✅ **Drift gate passed**'; else echo '❌ **Drift gate failed** (metric regressed vs baseline)'; fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $code

      - name: Upload eval metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-metrics
          path: metrics/
          if-no-files-found: ignore
