name: Continuous RAG Evaluation

on:
  workflow_dispatch:        # manual "Run workflow" button — pick the provider
    inputs:
      provider:
        description: "Chat provider for eval"
        type: choice
        options: [ollama, openai]
        default: ollama
      model:
        description: "Model id (e.g. llama3.2:3b, gpt-4o-mini)"
        default: llama3.2:3b
  push:
    paths:
      - 'data/**/*.md'
      - 'src/**'
      - 'config/**'
      - 'pipeline.py'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'data/**/*.md'
      - 'src/**'
      - 'config/**'
      - 'pipeline.py'
      - '.github/workflows/**'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: pytest tests/ -v

  evaluate-rag:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: curl -fsSL https://ollama.com/install.sh | sh

      - run: ollama serve & sleep 10

      - run: |
          ollama pull llama3.2:3b
          ollama pull nomic-embed-text

      - name: Run evaluation (fails on drift)
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          # Default (push): local Ollama, no paid key. Manual run can pick openai.
          LLM_PROVIDER: ${{ github.event.inputs.provider || 'ollama' }}
          LLM_MODEL: ${{ github.event.inputs.model || 'llama3.2:3b' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          EMBED_PROVIDER: sentence_transformers
          EMBED_MODEL: BAAI/bge-small-en-v1.5
        run: |
          set +e
          python pipeline.py | tee eval_output.txt
          code=${PIPESTATUS[0]}
          {
            echo '## 📊 RAG Evaluation'
            echo '```'
            grep -A20 'EVALUATION RESULTS' eval_output.txt || tail -n 25 eval_output.txt
            echo '```'
            if [ "$code" -eq 0 ]; then echo '✅ **Drift gate passed**'; else echo '❌ **Drift gate failed** (metric regressed vs baseline)'; fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $code

      - name: Upload eval metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-metrics
          path: metrics/
          if-no-files-found: ignore
