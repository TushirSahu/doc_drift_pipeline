name: Scheduled Re-ingestion & Drift Check

# Runs on a cadence (not just on push) so documentation drift is caught even
# when docs change outside this repo's normal commit flow. Also runnable on
# demand from the Actions tab.
on:
  schedule:
    - cron: '0 6 * * *'   # every day at 06:00 UTC
  workflow_dispatch:

jobs:
  auto-reingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # allow committing refreshed benchmark scores back to the repo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: curl -fsSL https://ollama.com/install.sh | sh
      - run: ollama serve & sleep 10
      - run: |
          ollama pull llama3.2:3b
          ollama pull nomic-embed-text

      - name: Detect changes, re-ingest, evaluate, fail on drift
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: python -m src.automation.cli --once --force

      # Re-run the multi-LLM benchmark so the leaderboard on the site stays fresh.
      # Runs even if the drift gate above failed, so scores still update. Docs are
      # already ingested by the step above, hence --skip-ingest.
      - name: Benchmark models & pick champion
        if: ${{ !cancelled() }}
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}            # for the HF-router registry models
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }} # for any OpenAI registry models
        run: python pipeline.py --compare-models --skip-ingest

      # Commit the refreshed scores + champion so the deployed API (GET /models)
      # and the site's leaderboard serve live numbers on the next deploy.
      - name: Commit benchmark results
        if: ${{ !cancelled() }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f metrics/model_scores.json metrics/champion.json
          if git diff --cached --quiet; then
            echo "No score changes to commit."
          else
            git commit -m "chore: refresh model benchmark scores [skip ci]"
            git push
          fi
