models:
  llm: "meta-llama/Llama-3.1-8B-Instruct:cheapest"
  embed: "BAAI/bge-small-en-v1.5"
  provider: "openai"        # chat: "ollama" (local) or "openai" (OpenAI/Groq/HF router/vLLM)
  embed_provider: "sentence_transformers"  # embeddings: "ollama" | "openai" | "sentence_transformers" (local CPU)
  embed_dim: 384           # 384 bge-small/MiniLM; 768 nomic/bge-base; 1536 OpenAI 3-small
  # base_url for openai-compatible hosts comes from OPENAI_BASE_URL env

  # --- Multi-LLM benchmark registry ------------------------------------------
  # Candidate chat models compared head-to-head by `pipeline.py --compare-models`.
  # Each entry is self-contained (its own provider + credentials), so an HF-router
  # model and a local Ollama model can be scored in ONE run without clashing over
  # shared env vars. The winner (best `primary_metric`) becomes the serving model.
  #   provider     : "openai" (any OpenAI-compatible host) or "ollama" (local)
  #   model        : model id for that provider
  #   base_url     : (openai only) endpoint; omit to use OPENAI_BASE_URL env
  #   api_key_env  : (openai only) env var holding the key; default OPENAI_API_KEY
  # Add a model = add a list entry. Nothing else to change.
  registry:
    - name: llama-3.1-8b-hf
      provider: openai
      model: "meta-llama/Llama-3.1-8B-Instruct:cheapest"
      base_url: "https://router.huggingface.co/v1"
      api_key_env: HF_TOKEN
    # - name: qwen2.5-7b-hf
    #   provider: openai
    #   model: "Qwen/Qwen2.5-7B-Instruct:cheapest"
      # base_url: "https://router.huggingface.co/v1"
      # api_key_env: HF_TOKEN
    # HF free providers host no general <=7B instruct model (only Coder-3B,
    # poor at doc QA). 8B is the lightweight floor that actually serves.
    - name: qwen3-8b-hf
      provider: openai
      model: "Qwen/Qwen3-8B:cheapest"
      base_url: "https://router.huggingface.co/v1"
      api_key_env: HF_TOKEN
    - name: llama3-8b-hf
      provider: openai
      model: "meta-llama/Meta-Llama-3-8B-Instruct:cheapest"
      base_url: "https://router.huggingface.co/v1"
      api_key_env: HF_TOKEN
  # Metric the champion is chosen by (must be one of evaluation.metrics below).
  primary_metric: "answer_correctness"

chunking:
  chunk_size: 500
  overlap: 50
  strategy: "markdown"

retrieval:
  top_k: 3
  mmr_lambda: 0.5
  use_mmr: true             # drop near-duplicate chunks so context isn't repeated
  use_hybrid: false
  hybrid_alpha: 0.5
  rerank: false
  rerank_candidates: 10
  multi_query: false        # expand the query into paraphrases and merge results
  multi_query_count: 3
  reranker: "cross_encoder"           # "cross_encoder" (bge) or "llm"
  reranker_model: "BAAI/bge-reranker-base"

evaluation:
  num_questions: 5
  metrics:
    - faithfulness
    - answer_relevancy
    - context_precision
    - context_recall
    - answer_correctness
  timeout: 600
  max_workers: 1

drift:
  faithfulness_threshold: 0.8
  regression_threshold: 0.05
  baseline_path: "metrics/baseline.json"

agentic:
  max_steps: 3             # fewer re-searches → less duplicated/blended context
  tools:
    - calculator
    - search_docs
  # web_search is available but disabled by default (stub only)

paths:
  data_dir: "data"
  metrics_dir: "metrics"
  prompts_dir: "prompts"

prompts:
  version: "v1"

api:
  rate_limit_per_min: 60    # per-IP; makes a keyless public demo safe (0 disables)
  allow_benchmark_trigger: true  # let POST /models/benchmark spawn --compare-models
                                  # (off by default so a public demo can't be abused)

guardrails:
  min_grounding: 0.3       # answers below this overlap with context are flagged
  require_citation: true   # final answer must include [Source: ...]

cache:
  embedding_maxsize: 2048
  embedding_ttl: 86400     # embeddings are deterministic — cache for a day
  retrieval_maxsize: 512
  retrieval_ttl: 600       # results invalidated on re-ingest

resilience:
  attempts: 3              # retries for Ollama/Qdrant calls
  base_delay: 0.5

automation:
  watch_interval: 30       # seconds between polls in `--watch` mode
  fail_on_drift: true      # `--once` exits non-zero when drift is detected
