<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>DocDrift — Provider Eval</title>
<style>
  :root{--ink:#111;--line:#e6e6e6;--muted:#666;--chip:#f4f4f4}
  body{margin:0;background:#fff;color:#111;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  .wrap{max-width:820px;margin:0 auto;padding:28px 20px}
  h1{font-size:20px;margin:0 0 4px} .sub{color:var(--muted);font-size:13px;margin-bottom:20px}
  .row{display:flex;gap:8px;margin-bottom:18px}
  input{flex:1;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font:inherit;font-size:13px}
  button{background:var(--ink);color:#fff;border:none;border-radius:9px;padding:9px 16px;cursor:pointer}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.6px}
  td.n{font-variant-numeric:tabular-nums}
  .bar{height:6px;background:var(--chip);border:1px solid var(--line);border-radius:99px;overflow:hidden;margin-top:4px}
  .bar>span{display:block;height:100%;background:var(--ink)}
  .best{font-weight:600} .win{font-size:10px;background:var(--ink);color:#fff;border-radius:5px;padding:1px 6px;margin-left:6px}
  .err{color:#666;font-style:italic}
  .hint{color:var(--muted);font-size:12px;margin-top:16px;line-height:1.6}
  code{background:var(--chip);border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:12px}
</style></head><body>
<div class="wrap">
  <h1>Provider evaluation</h1>
  <div class="sub">Ragas scores per LLM, from <code>metrics/provider_comparison.json</code></div>
  <div class="row">
    <input id="path" value="../metrics/provider_comparison.json"/>
    <button onclick="load()">Load</button>
  </div>
  <div id="out"></div>
  <div class="hint">Generate the data with:
    <code>python pipeline.py --compare-providers "ollama=llama3.2:3b,openai=gpt-4o-mini"</code><br>
    Then serve this folder (<code>python -m http.server</code>) so the fetch works.
  </div>
</div>
<script>
const METRICS = ["faithfulness","answer_relevancy","context_precision","context_recall","answer_correctness"];
async function load(){
  const out = document.getElementById('out');
  try{
    const r = await fetch(document.getElementById('path').value);
    if(!r.ok) throw new Error('HTTP '+r.status);
    render((await r.json()).comparison || {});
  }catch(e){ out.innerHTML = `<p class="err">Couldn't load: ${e.message}. Serve over http and check the path.</p>`; }
}
function render(cmp){
  const provs = Object.keys(cmp);
  const metrics = METRICS.filter(m => provs.some(p => typeof cmp[p][m] === 'number'));
  let h = '<table><tr><th>Metric</th>' + provs.map(p=>`<th>${p}</th>`).join('') + '</tr>';
  for(const m of metrics){
    const vals = provs.map(p => cmp[p][m]);
    const best = Math.max(...vals.filter(v=>typeof v==='number'));
    h += `<tr><td>${m.replace(/_/g,' ')}</td>` + provs.map(p=>{
      const v = cmp[p][m];
      if(typeof v!=='number') return `<td class="err">${cmp[p].error?'error':'—'}</td>`;
      const win = v===best ? '<span class="win">best</span>' : '';
      return `<td class="n"><span class="${v===best?'best':''}">${(v*100).toFixed(1)}%</span>${win}
        <div class="bar"><span style="width:${v*100}%"></span></div></td>`;
    }).join('') + '</tr>';
  }
  h += '</table>';
  document.getElementById('out').innerHTML = h;
}
load();
</script>
</body></html>
