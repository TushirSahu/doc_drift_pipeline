<svg viewBox="0 0 940 520" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16203a"/><stop offset="0.55" stop-color="#0b0f17"/>
    </linearGradient>
    <linearGradient id="acc2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5b8cff"/><stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <linearGradient id="barg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2fd6a0"/><stop offset="1" stop-color="#5bd0ff"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="940" height="520" rx="18" fill="url(#bg2)"/>

  <!-- top bar -->
  <circle cx="34" cy="34" r="12" fill="url(#acc2)"/>
  <text x="54" y="33" fill="#fff" font-size="16" font-weight="700">DocDrift</text>
  <text x="148" y="33" fill="#93a1b5" font-size="11.5">Agentic RAG — grounded, evaluated, drift-gated</text>
  <rect x="742" y="20" width="172" height="28" rx="14" fill="rgba(47,214,160,.12)" stroke="rgba(47,214,160,.35)"/>
  <circle cx="762" cy="34" r="4" fill="#2fd6a0"/>
  <text x="774" y="38" fill="#2fd6a0" font-size="11.5" font-weight="600">Quality gate: passing</text>

  <!-- ===== LEFT: chat card ===== -->
  <rect x="24" y="64" width="560" height="432" rx="16" fill="#121826" stroke="#1f2937"/>
  <text x="44" y="92" fill="#93a1b5" font-size="11" font-weight="700" letter-spacing="1.2">ASK THE DOCS</text>

  <!-- question bubble -->
  <rect x="214" y="106" width="350" height="40" rx="12" fill="rgba(91,140,255,.16)" stroke="rgba(91,140,255,.3)"/>
  <text x="544" y="131" text-anchor="end" fill="#e6edf6" font-size="12.5">How long is an admin session in minutes?</text>

  <!-- answer bubble -->
  <rect x="44" y="160" width="520" height="316" rx="12" fill="#0c121d" stroke="#1f2937"/>
  <text x="62" y="188" fill="#e6edf6" font-size="13.5">Auth Service v2.0 uses <tspan font-weight="700">OAuth2 with JWT tokens</tspan>. Admin users</text>
  <text x="62" y="208" fill="#e6edf6" font-size="13.5">have a max session of 12 hours = <tspan font-weight="700">720 minutes</tspan>.</text>
  <text x="62" y="228" fill="#5b8cff" font-size="13" font-weight="600">[Source: auth_service_v2.md]</text>

  <!-- badges -->
  <rect x="62" y="244" width="116" height="26" rx="8" fill="rgba(47,214,160,.12)" stroke="rgba(47,214,160,.3)"/>
  <text x="120" y="261" text-anchor="middle" fill="#2fd6a0" font-size="11.5" font-weight="600">● Grounded 0.94</text>
  <rect x="186" y="244" width="74" height="26" rx="8" fill="rgba(47,214,160,.12)" stroke="rgba(47,214,160,.3)"/>
  <text x="223" y="261" text-anchor="middle" fill="#2fd6a0" font-size="11.5" font-weight="600">✓ Cited</text>
  <rect x="268" y="244" width="78" height="26" rx="8" fill="#172033" stroke="#1f2937"/>
  <text x="307" y="261" text-anchor="middle" fill="#93a1b5" font-size="11.5" font-weight="600">⚙ 2 steps</text>

  <!-- source chips -->
  <rect x="62" y="282" width="170" height="24" rx="7" fill="#172033" stroke="#1f2937"/>
  <text x="74" y="298" fill="#93a1b5" font-size="11" font-family="monospace">auth_service_v2.md · chunk 1</text>
  <rect x="240" y="282" width="170" height="24" rx="7" fill="#172033" stroke="#1f2937"/>
  <text x="252" y="298" fill="#93a1b5" font-size="11" font-family="monospace">auth_service_v2.md · chunk 2</text>

  <!-- agent trace -->
  <line x1="62" y1="320" x2="546" y2="320" stroke="#1f2937" stroke-dasharray="3 3"/>
  <text x="62" y="338" fill="#93a1b5" font-size="11.5">▾ Agent trace (2 tool calls)</text>
  <rect x="62" y="346" width="20" height="20" rx="6" fill="#172033"/>
  <text x="72" y="360" text-anchor="middle" fill="#5b8cff" font-size="11" font-weight="700">1</text>
  <text x="92" y="360" fill="#cdd9ea" font-size="11.5" font-family="monospace">search_docs("admin session length")</text>
  <text x="92" y="375" fill="#5b6878" font-size="10.5">→ 3 chunks · top score 0.88</text>
  <rect x="62" y="386" width="20" height="20" rx="6" fill="#172033"/>
  <text x="72" y="400" text-anchor="middle" fill="#5b8cff" font-size="11" font-weight="700">2</text>
  <text x="92" y="400" fill="#cdd9ea" font-size="11.5" font-family="monospace">calculator("12 * 60")</text>
  <text x="92" y="415" fill="#5b6878" font-size="10.5">→ 720</text>

  <!-- feedback row -->
  <line x1="62" y1="430" x2="546" y2="430" stroke="#1f2937"/>
  <text x="62" y="452" fill="#5b6878" font-size="11.5">Was this answer helpful?</text>
  <rect x="436" y="438" width="44" height="28" rx="8" fill="#172033" stroke="#1f2937"/>
  <text x="458" y="457" text-anchor="middle" font-size="14">👍</text>
  <rect x="490" y="438" width="44" height="28" rx="8" fill="#172033" stroke="#1f2937"/>
  <text x="512" y="457" text-anchor="middle" font-size="14">👎</text>

  <!-- ===== RIGHT: metrics card ===== -->
  <rect x="600" y="64" width="316" height="432" rx="16" fill="#121826" stroke="#1f2937"/>
  <text x="620" y="92" fill="#93a1b5" font-size="11" font-weight="700" letter-spacing="1.2">LIVE METRICS</text>

  <!-- kpis -->
  <g>
    <rect x="620" y="104" width="132" height="58" rx="11" fill="#0c121d" stroke="#1f2937"/>
    <text x="634" y="134" fill="#e6edf6" font-size="19" font-weight="700">182<tspan font-size="11" fill="#5b6878"> ms</tspan></text>
    <text x="634" y="150" fill="#93a1b5" font-size="10.5">p50 latency</text>
    <rect x="764" y="104" width="132" height="58" rx="11" fill="#0c121d" stroke="#1f2937"/>
    <text x="778" y="134" fill="#e6edf6" font-size="19" font-weight="700">410<tspan font-size="11" fill="#5b6878"> ms</tspan></text>
    <text x="778" y="150" fill="#93a1b5" font-size="10.5">p95 latency</text>
    <rect x="620" y="170" width="132" height="58" rx="11" fill="#0c121d" stroke="#1f2937"/>
    <text x="634" y="200" fill="#e6edf6" font-size="19" font-weight="700">0.4<tspan font-size="11" fill="#5b6878"> %</tspan></text>
    <text x="634" y="216" fill="#93a1b5" font-size="10.5">error rate</text>
    <rect x="764" y="170" width="132" height="58" rx="11" fill="#0c121d" stroke="#1f2937"/>
    <text x="778" y="200" fill="#e6edf6" font-size="19" font-weight="700">96<tspan font-size="11" fill="#5b6878"> %</tspan></text>
    <text x="778" y="216" fill="#93a1b5" font-size="10.5">grounding pass-rate</text>
  </g>

  <text x="620" y="256" fill="#93a1b5" font-size="11" font-weight="700" letter-spacing="1.2">QUALITY GATE vs BASELINE</text>

  <!-- metric bars -->
  <g font-size="11.5">
    <text x="620" y="282" fill="#e6edf6">Faithfulness</text><text x="896" y="282" text-anchor="end" fill="#e6edf6" font-weight="600">99%</text>
    <rect x="620" y="288" width="276" height="7" rx="4" fill="#0c121d" stroke="#1f2937"/>
    <rect x="620" y="288" width="273" height="7" rx="4" fill="url(#barg)"/>

    <text x="620" y="314" fill="#e6edf6">Answer relevancy</text><text x="896" y="314" text-anchor="end" fill="#e6edf6" font-weight="600">97%</text>
    <rect x="620" y="320" width="276" height="7" rx="4" fill="#0c121d" stroke="#1f2937"/>
    <rect x="620" y="320" width="268" height="7" rx="4" fill="url(#barg)"/>

    <text x="620" y="346" fill="#e6edf6">Context precision</text><text x="896" y="346" text-anchor="end" fill="#e6edf6" font-weight="600">100%</text>
    <rect x="620" y="352" width="276" height="7" rx="4" fill="#0c121d" stroke="#1f2937"/>
    <rect x="620" y="352" width="276" height="7" rx="4" fill="url(#barg)"/>

    <text x="620" y="378" fill="#e6edf6">Context recall</text><text x="896" y="378" text-anchor="end" fill="#e6edf6" font-weight="600">95%</text>
    <rect x="620" y="384" width="276" height="7" rx="4" fill="#0c121d" stroke="#1f2937"/>
    <rect x="620" y="384" width="262" height="7" rx="4" fill="url(#barg)"/>
  </g>

  <!-- gate -->
  <rect x="620" y="410" width="276" height="62" rx="12" fill="rgba(47,214,160,.12)" stroke="rgba(47,214,160,.3)"/>
  <text x="640" y="440" font-size="20">✓</text>
  <text x="668" y="436" fill="#2fd6a0" font-size="13.5" font-weight="700">No drift detected</text>
  <text x="668" y="454" fill="#93a1b5" font-size="10.5">All metrics within threshold of baseline.json</text>
</svg>
